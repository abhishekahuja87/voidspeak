    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidSpeak | Release into the Void</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #0a0a0a !important;
            color: #cccccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
            position: relative;
        }

        header {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 25px;
            position: relative;
            z-index: 1000;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 6px;
            color: #ffffff;
            margin: 0;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        p.subtitle {
            font-size: 0.9rem;
            color: #666;
            margin-top: 8px;
        }

        /* FIXED STRUCTURAL BLOCK */
        .void-main-container {
            width: 100%;
            max-width: 600px;
            position: relative;
            margin-bottom: 25px;
            z-index: 1000; 
        }

        .void-box-input {
            position: relative;
            width: 100%;
            height: 160px; /* Locked explicit height execution */
            background-color: #111111 !important; 
            border: 1px solid #333333 !important;
            border-radius: 4px;
            padding: 15px;
            display: block !important;
        }

        .text-area-field {
            width: 100% !important;
            height: 130px !important; /* Forces layout vertical drawing parameters */
            background: transparent !important;
            border: none !important;
            color: #ffffff !important; 
            font-size: 1.1rem !important;
            resize: none !important;
            outline: none !important;
            display: block !important;
        }

        .text-burn-out {
            color: #ff3300 !important;
            filter: blur(4px) !important;
            caret-color: transparent !important;
            pointer-events: none;
            text-shadow: 0 0 8px #ff3300;
        }

        .telemetry-row {
            width: 100%;
            max-width: 600px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
            z-index: 1000;
            text-align: center;
        }

        .telemetry-box {
            background: #111;
            border: 1px solid #1c1c1c;
            padding: 10px;
            border-radius: 4px;
        }

        .telemetry-label {
            font-size: 0.7rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .telemetry-value {
            font-size: 1.1rem;
            color: #888;
            font-weight: bold;
        }

        #burnCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999; 
        }

        button {
            background: #000000 !important;
            border: 1px solid #444 !important;
            color: #999 !important;
            padding: 12px 20px;
            margin-top: 15px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            width: 100%;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: block !important;
            position: relative;
            z-index: 1000;
        }

        button:hover {
            background: #ffffff !important;
            color: #000000 !important;
            border-color: #ffffff !important;
        }

        button:disabled {
            border-color: #111 !important;
            color: #333 !important;
            background: transparent !important;
        }

        #map {
            width: 100%;
            max-width: 800px;
            height: 320px;
            border-radius: 4px;
            border: 1px solid #1a1a1a;
            background: #0d0d0d;
            position: relative;
            z-index: 10;
        }

        .leaflet-container {
            background: #0d0d0d !important;
        }

        footer {
            margin-top: auto;
            padding: 30px 20px;
            font-size: 0.8rem;
            color: #333;
            text-align: center;
            position: relative;
            z-index: 1000;
        }

        footer a {
            color: #555;
            text-decoration: none;
        }

        /* Absolute AdSense shielding rule */
        iframe[id^="google_ads_iframe"],
        .google-auto-placed,
        ins.adsbygoogle[data-ad-status="unfilled"] {
            display: none !important;
            height: 0px !important;
            visibility: hidden !important;
            margin: 0 !important;
            padding: 0 !important;
        }
    </style>
</head>
<body>

    <canvas id="burnCanvas"></canvas>

    <header>
        <h1>VOIDSPEAK</h1>
        <p class="subtitle">Type your secret. Release it forever. Watch the world let go.</p>
    </header>

    <div class="void-main-container">
        <div class="void-box-input" id="wrapperBounds">
            <textarea id="secretInput" class="text-area-field" placeholder="Write something you need to get off your chest..."></textarea>
        </div>
        <button id="releaseBtn" onclick="releaseToVoid()">RELEASE INTO THE VOID</button>
    </div>

    <div class="telemetry-row">
        <div class="telemetry-box">
            <div class="telemetry-label">Void Frequency</div>
            <div class="telemetry-value" id="freqVal">432.00 Hz</div>
        </div>
        <div class="telemetry-box">
            <div class="telemetry-label">Secrets Dissolved</div>
            <div class="telemetry-value" id="countVal">1,428</div>
        </div>
        <div class="telemetry-box">
            <div class="telemetry-label">Active Nodes</div>
            <div class="telemetry-value" id="nodesVal">1</div>
        </div>
    </div>

    <div id="map"></div>

    <footer>
        <p>© 2026 VoidSpeak | <a href="#privacy" onclick="alert('Privacy Guarantee: This website does not possess a backend or database for storing text. Your input vanishes permanently from your browser cache the instant you click Release.')">Privacy & Philosophy</a></p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize Map
        const map = L.map('map', {
            zoomControl: true,
            attributionControl: false
        }).setView([20, 0], 2);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        setTimeout(() => {
            map.invalidateSize();
        }, 200);

        // Simulated Telemetry Loops
        let globalCrushedCount = 1428; 
        document.getElementById('countVal').innerText = globalCrushedCount.toLocaleString();

        setInterval(() => {
            const drift = (Math.random() * 2 - 1) * 0.15;
            const finalFreq = (432 + drift).toFixed(2);
            document.getElementById('freqVal').innerText = `${finalFreq} Hz`;
        }, 1500);

        setInterval(() => {
            const simulatedNodes = Math.floor(Math.random() * 4) + 1;
            document.getElementById('nodesVal').innerText = simulatedNodes;
        }, 8000);

        // Particle System
        const canvas = document.getElementById('burnCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class EmberParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3.5 + 1;
                this.speedX = Math.random() * 6 - 3;
                this.speedY = Math.random() * -5 - 2; 
                
                const colors = [
                    `rgba(255, 68, 0, ${Math.random() * 0.4 + 0.6})`,  
                    `rgba(230, 0, 0, ${Math.random() * 0.4 + 0.6})`,    
                    `rgba(40, 40, 40, ${Math.random() * 0.3 + 0.4})`    
                ];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.opacity = 1;
                this.fade = Math.random() * 0.01 + 0.005; 
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.x += Math.sin(this.y / 30) * 0.5;
                this.opacity -= this.fade;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.shadowBlur = this.color.includes('255') || this.color.includes('230') ? 8 : 0;
                ctx.shadowColor = '#ff4400'; 
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0; 
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].opacity <= 0 || particles[i].y < 0) {
                    particles.splice(i, 1);
                }
            }
            if (particles.length > 0) {
                requestAnimationFrame(animateParticles);
            }
        }

        function releaseToVoid() {
            const textarea = document.getElementById('secretInput');
            const button = document.getElementById('releaseBtn');
            const wrapper = document.getElementById('wrapperBounds');
            
            if (textarea.value.trim() === "") {
                alert("The void accepts everything, but you must type something first.");
                return;
            }

            textarea.disabled = true;
            button.disabled = true;

            globalCrushedCount++;
            document.getElementById('countVal').innerText = globalCrushedCount.toLocaleString();

            const rect = wrapper.getBoundingClientRect();
            resizeCanvas();

            const totalEmbers = Math.min(textarea.value.length * 4, 450);
            for (let i = 0; i < totalEmbers; i++) {
                const px = rect.left + Math.random() * rect.width;
                const py = rect.top + Math.random() * rect.height;
                particles.push(new EmberParticle(px, py));
            }
            
            animateParticles();
            textarea.classList.add('text-burn-out');
            wrapper.style.borderColor = '#ff3300'; 

            fetch('https://ipapi.co/json/')
                .then(response => response.json())
                .then(data => {
                    if(data.latitude && data.longitude) {
                        const pulseCircle = L.circleMarker([data.latitude, data.longitude], {
                            color: '#ff3300', 
                            fillColor: '#ff3300',
                            fillOpacity: 0.6,
                            opacity: 0.8,
                            weight: 1,
                            radius: 9
                        }).addTo(map);

                        map.panTo([data.latitude, data.longitude], { animate: true, duration: 1.5 });

                        setTimeout(() => {
                            pulseCircle.setStyle({fillOpacity: 0.1, opacity: 0.15, color: '#444'});
                        }, 4000);
                    }
                })
                .catch(err => {
                    L.circleMarker([20, 0], { color: '#ff3300', radius: 6 }).addTo(map);
                });

            setTimeout(() => {
                textarea.value = "";
                textarea.classList.remove('text-burn-out');
                wrapper.style.borderColor = '#333333';
                textarea.disabled = false;
                button.disabled = false;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                textarea.placeholder = "The ashes cleared completely. Write another if you must...";
            }, 3000);
        }
    </script>
</body>
</html>
